# ~/.config/locale.conf

# Base language.
LANG=en_US.UTF-8
LC_MESSAGES=en_DK.UTF-8

# Time and date
LC_TIME=en_DK.UTF-8

LC_PAPER=en_DK.UTF-8
LC_MEASUREMENT=en_DK.UTF-8

LC_COLLATE=POSIX

# Address, telephone, etc.
LC_TELEPHONE=de_DE.UTF-8 # +49 176 000000000
LC_ADDRESS=en_DK.UTF-8 # street number postcode city
LC_NAME=en_US.UTF-8 # firstname lastname
